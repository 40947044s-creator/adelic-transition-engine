<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adelic Transition Engine | Project NP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        :root { --space: #020408; --gold: #FFD700; --text: #e2e8f0; }
        body { background: var(--space); color: var(--text); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #ui { position: absolute; width: 100%; text-align: center; top: 10vh; z-index: 10; pointer-events: none; }
        h1 { letter-spacing: 10px; color: var(--gold); text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .formula { font-size: 1.5rem; margin-top: 20px; color: var(--text); }
        #footer { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>ADELIC TRANSITION</h1>
        <div id="formula" class="formula">Rotate the Phase to Ground the Truth: $e^{i\theta} + 1$</div>
        <p id="complexity">System Entropy: HIGH (O(2^n))</p>
    </div>
    <div id="footer">FOR ALL PREDECESSORS • MARILYN HSIAO • NTNU CSIE</div>

    <script>
        let angle = 0;
        let isSnapped = false;
        let stars = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for(let i=0; i<200; i++) stars.push({x: random(width), y: random(height), size: random(1, 3)});
        }

        function draw() {
            background(2, 4, 8, isSnapped ? 255 : 40); 
            
            if (!isSnapped) {
                // Interactive Phase Adjustment
                if (mouseIsPressed) {
                    let target = atan2(mouseY - height/2, mouseX - width/2);
                    angle = lerp(angle, target, 0.1);
                }
                drawNoise(angle);
            } else {
                drawCrystallization();
            }
            drawEulerCompass();
        }

        function drawNoise(a) {
            let friction = map(abs(a - PI), 0, PI, 2, 60);
            fill(255, 150);
            stars.forEach(s => {
                ellipse(s.x + random(-friction, friction), s.y + random(-friction, friction), s.size);
            });
            if (abs(angle - PI) < 0.08 || abs(angle + PI) < 0.08) {
                executeMarilynFold();
            }
        }

        function executeMarilynFold() {
            isSnapped = true;
            document.getElementById('formula').innerHTML = "$e^{i\\pi} + 1 = 0$ (Crystallized)";
            document.getElementById('complexity').innerHTML = "System Entropy: ZERO (O(1))";
            document.getElementById('complexity').style.color = "#FFD700";
        }

        function drawCrystallization() {
            fill(255, 215, 0); // Coldplay Yellow
            textAlign(CENTER);
            textSize(width/15);
            text("GENERATED SOLUTION: P × Q", width/2, height/2);
            textSize(20);
            text("Complexity Collapse Complete.", width/2, height/2 + 60);
        }

        function drawEulerCompass() {
            push();
            translate(width/2, height/2);
            noFill(); stroke(255, 50); ellipse(0, 0, 300);
            stroke(isSnapped ? '#FFD700' : 255); strokeWeight(4);
            line(0, 0, 150 * cos(isSnapped ? PI : angle), 150 * sin(isSnapped ? PI : angle));
            pop();
        }
    </script>
</body>
</html>
