<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adelic Transition Engine | Project NP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --space: #020408; --gold: #FFD700; --text: #f1f5f9; }
        body { background: var(--space); color: var(--text); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        /* Persistant Music Shell */
        #resonance-box { position: fixed; bottom: 20px; left: 20px; z-index: 1000; width: 300px; opacity: 0.5; transition: 0.5s; }
        #resonance-box:hover { opacity: 1; }

        nav { position: fixed; top: 0; width: 100%; padding: 25px; text-align: center; z-index: 100; }
        nav button { background: none; border: none; color: #4b5563; margin: 0 20px; cursor: pointer; letter-spacing: 2px; }
        nav button.active { color: var(--gold); border-bottom: 1px solid var(--gold); }

        .overlay { position: absolute; width: 100%; text-align: center; top: 15vh; pointer-events: none; z-index: 10; }
        h1 { font-size: 2.5rem; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin: 0; }
        
        #complexity-info { position: fixed; bottom: 20px; right: 20px; text-align: right; color: var(--gold); font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<nav>
    <button class="active">THE STAGE</button>
    <button onclick="alert('Algebra: 2-adic Peeling\nLogic: XOR Sentinel\nPhysics: O(1) Snap')">ENLIGHTENMENT</button>
</nav>

<div id="resonance-box">
    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/11440784&color=%23FFD700&auto_play=false&hide_related=true"></iframe>
</div>

<div class="overlay">
    <h1>Adelic Transition</h1>
    <div style="font-size: 1.5rem; margin-top: 10px;">\[ e^{i\theta} + 1 = 0 \]</div>
    <p id="complexity-status">ENTROPY: HIGH (O(2^n))</p>
</div>

<div id="complexity-info">FOR ALL PREDECESSORS • MARILYN HSIAO</div>

<script>
    let bits = []; let isSnapped = false; let angle = 0;

    function setup() {
        let canvas = createCanvas(windowWidth, windowHeight);
        canvas.style('display', 'block');
        // Quaternary Cell Initializations (0-3)
        for(let i=0; i<450; i++) {
            bits.push({
                val: floor(random(4)),
                x: random(width), y: random(height),
                offset: random(TWO_PI),
                speed: random(0.01, 0.04),
                tx: 0, ty: 0
            });
        }
    }

    function draw() {
        background(2, 4, 8);
        
        if (!isSnapped) {
            // Logic: Adjusting the Phase toward the Grounded Truth
            if (mouseIsPressed && mouseY > 100) {
                angle = lerp(angle, atan2(mouseY - height/2, mouseX - width/2), 0.1);
            }
            
            let diff = abs(angle - PI);
            if (diff > PI) diff = abs(diff - TWO_PI);
            
            // The "Dance" of RAF: Vibration linked to distance from PI
            let friction = map(diff, 0, PI, 1, 35);
            
            fill(255, 180); textAlign(CENTER); textSize(14);
            bits.forEach(b => {
                let dx = sin(frameCount * b.speed + b.offset) * friction;
                let dy = cos(frameCount * b.speed + b.offset) * friction;
                text(b.val, b.x + dx, b.y + dy);
            });

            // The O(1) Transition Point
            if (diff < 0.05) {
                isSnapped = true;
                angle = PI;
                // Crystallization: Morphing noise into the factor rings
                bits.forEach((b, i) => {
                    let r = i % 2 === 0 ? 140 : 210;
                    let theta = map(i, 0, bits.length, 0, TWO_PI);
                    b.tx = width/2 + r * cos(theta);
                    b.ty = height/2 + r * sin(theta);
                });
                document.getElementById('complexity-status').innerHTML = "ENTROPY: ZERO (O(1))";
                document.getElementById('complexity-status').style.color = "#FFD700";
            }
        } else {
            // The Result: Atemporal alignment achieved
            fill(255, 215, 0, 220);
            bits.forEach(b => {
                b.x = lerp(b.x, b.tx, 0.05);
                b.y = lerp(b.y, b.ty, 0.05);
                text(b.val, b.x, b.y);
            });
            textSize(55); text("P × Q = N", width/2, height/2 + 15);
        }

        // The Euler Dial
        push();
        translate(width/2, height/2);
        noFill(); stroke(255, 20); ellipse(0, 0, 300);
        stroke(isSnapped ? '#FFD700' : 255); strokeWeight(3);
        line(0, 0, 150 * cos(isSnapped ? PI : angle), 150 * sin(isSnapped ? PI : angle));
        pop();
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
